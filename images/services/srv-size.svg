<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs>
  <radialGradient id="g" cx="50%" cy="47%" r="38%">
    <stop offset="0%" stop-color="#C9A832" stop-opacity=".22"/>
    <stop offset="100%" stop-color="#C9A832" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="400" height="300" fill="#F5F0E8"/>
<ellipse cx="200" cy="142" rx="90" ry="72" fill="url(#g)"/>

<!-- Outer ring -->
<circle cx="200" cy="142" r="54" fill="none" stroke="#C9A832" stroke-width="1.8"/>
<!-- Inner ring band -->
<circle cx="200" cy="142" r="38" fill="none" stroke="#C9A832" stroke-width="0.8" opacity=".35"/>

<!-- Finger silhouette through ring (two parallel lines with rounded top) -->
<path d="M 192 88 Q 200 80 208 88 L 208 196 L 192 196 Z" fill="none" stroke="#C9A832" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity=".65"/>

<!-- Measurement tick marks around ring (every 30°) -->
<line x1="200" y1="82" x2="200" y2="74" stroke="#D4B84A" stroke-width="1.1" stroke-linecap="round"/>
<line x1="227" y1="89" x2="231" y2="82" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>
<line x1="246" y1="115" x2="253" y2="111" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>
<line x1="254" y1="142" x2="262" y2="142" stroke="#D4B84A" stroke-width="1.1" stroke-linecap="round"/>
<line x1="246" y1="169" x2="253" y2="173" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>
<line x1="227" y1="195" x2="231" y2="202" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>
<line x1="200" y1="202" x2="200" y2="210" stroke="#D4B84A" stroke-width="1.1" stroke-linecap="round"/>
<line x1="173" y1="195" x2="169" y2="202" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>
<line x1="154" y1="169" x2="147" y2="173" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>
<line x1="146" y1="142" x2="138" y2="142" stroke="#D4B84A" stroke-width="1.1" stroke-linecap="round"/>
<line x1="154" y1="115" x2="147" y2="111" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>
<line x1="173" y1="89" x2="169" y2="82" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>

<!-- Diameter callout line -->
<line x1="200" y1="142" x2="254" y2="142" stroke="#D4B84A" stroke-width="0.7" stroke-dasharray="2,3" opacity=".5"/>
<!-- Diameter label -->
<text x="266" y="139" font-family="Montserrat,Arial,sans-serif" font-size="8" fill="#C9A832" opacity=".75">Ø</text>
<text x="275" y="139" font-family="Montserrat,Arial,sans-serif" font-size="7" fill="#C9A832" opacity=".6">17 mm</text>

<!-- Size label callout top right -->
<line x1="228" y1="100" x2="248" y2="84" stroke="#D4B84A" stroke-width="0.7" opacity=".4"/>
<text x="252" y="82" font-family="Montserrat,Arial,sans-serif" font-size="7" fill="#C9A832" opacity=".6">US 7</text>

<text x="200" y="246" font-family="Montserrat,Arial,sans-serif" font-size="7.5" fill="#3C3830" text-anchor="middle" letter-spacing="3.5" opacity=".62">FIND YOUR SIZE</text>
<line x1="163" y1="252" x2="237" y2="252" stroke="#C9A832" stroke-width="0.5" opacity=".3"/>
</svg>
