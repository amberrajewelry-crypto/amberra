<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs>
  <radialGradient id="g" cx="50%" cy="53%" r="36%">
    <stop offset="0%" stop-color="#C9A832" stop-opacity=".22"/>
    <stop offset="100%" stop-color="#C9A832" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="400" height="300" fill="#F5F0E8"/>
<ellipse cx="200" cy="158" rx="82" ry="62" fill="url(#g)"/>

<!-- 5 fingers — vertical rounded bars -->
<!-- Pinky -->
<rect x="163" y="120" width="12" height="88" rx="6" fill="none" stroke="#C9A832" stroke-width="1.2" opacity=".7"/>
<!-- Ring finger -->
<rect x="179" y="106" width="13" height="102" rx="6.5" fill="none" stroke="#C9A832" stroke-width="1.2" opacity=".85"/>
<!-- Middle finger (tallest) -->
<rect x="196" y="96" width="13" height="112" rx="6.5" fill="none" stroke="#C9A832" stroke-width="1.2" opacity=".7"/>
<!-- Index -->
<rect x="213" y="108" width="13" height="100" rx="6.5" fill="none" stroke="#C9A832" stroke-width="1.2" opacity=".7"/>
<!-- Thumb (shorter, angled right side) -->
<rect x="228" y="136" width="11" height="62" rx="5.5" fill="none" stroke="#C9A832" stroke-width="1" opacity=".5"/>
<!-- Palm base -->
<path d="M 163 206 Q 163 222 175 226 Q 200 230 225 226 Q 239 222 239 206" fill="none" stroke="#C9A832" stroke-width="1.2" opacity=".7"/>

<!-- Ring on ring finger (179-192 area, around y=145) -->
<ellipse cx="185" cy="148" rx="11" ry="4.5" fill="none" stroke="#C9A832" stroke-width="2.2"/>
<!-- Amber stone on ring -->
<circle cx="185" cy="144" r="5" fill="#C9A832"/>
<circle cx="185" cy="144" r="2.5" fill="#E8D080"/>
<circle cx="183" cy="142" r="1.2" fill="#FAF8F5" opacity=".5"/>

<!-- AR reticle around ring finger -->
<circle cx="185" cy="150" r="32" fill="none" stroke="#C9A832" stroke-width="0.9" stroke-dasharray="5,7" opacity=".45"/>
<!-- Corner bracket markers -->
<path d="M 157 122 L 152 122 L 152 128" fill="none" stroke="#D4B84A" stroke-width="1.1" opacity=".6"/>
<path d="M 213 122 L 218 122 L 218 128" fill="none" stroke="#D4B84A" stroke-width="1.1" opacity=".6"/>
<path d="M 157 178 L 152 178 L 152 172" fill="none" stroke="#D4B84A" stroke-width="1.1" opacity=".6"/>
<path d="M 213 178 L 218 178 L 218 172" fill="none" stroke="#D4B84A" stroke-width="1.1" opacity=".6"/>

<!-- Sparkles near stone -->
<line x1="185" y1="106" x2="185" y2="102" stroke="#D4B84A" stroke-width="1" stroke-linecap="round"/>
<line x1="197" y1="112" x2="200" y2="109" stroke="#D4B84A" stroke-width="0.9" stroke-linecap="round" opacity=".7"/>
<line x1="173" y1="112" x2="170" y2="109" stroke="#D4B84A" stroke-width="0.9" stroke-linecap="round" opacity=".7"/>

<text x="200" y="252" font-family="Montserrat,Arial,sans-serif" font-size="7.5" fill="#3C3830" text-anchor="middle" letter-spacing="3.5" opacity=".62">VIRTUAL TRY ON</text>
<line x1="162" y1="258" x2="238" y2="258" stroke="#C9A832" stroke-width="0.5" opacity=".3"/>
</svg>
